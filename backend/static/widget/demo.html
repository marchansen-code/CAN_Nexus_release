<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CANUSA Nexus – Widget Demo</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; background: #f9fafb; color: #111827; }
    .demo-header { background: #111827; color: #fff; padding: 32px 24px; text-align: center; }
    .demo-header h1 { font-size: 24px; margin: 0 0 8px; }
    .demo-header p { font-size: 14px; color: #9ca3af; margin: 0; }
    .demo-body { max-width: 800px; margin: 40px auto; padding: 0 24px; }
    .demo-info { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 24px; margin-bottom: 32px; }
    .demo-info h2 { font-size: 16px; margin: 0 0 12px; }
    .demo-info pre { background: #f3f4f6; padding: 16px; border-radius: 8px; font-size: 13px; overflow-x: auto; line-height: 1.6; }
    .demo-info code { font-family: 'SF Mono', Monaco, Consolas, monospace; }
  </style>
</head>
<body>
  <div class="demo-header">
    <h1>CANUSA Nexus Search Widget</h1>
    <p>Demo-Seite zum Testen des einbettbaren Such-Widgets</p>
  </div>
  <div class="demo-body">
    <div class="demo-info">
      <h2>Einbettungs-Code</h2>
      <pre><code>&lt;div id="canusa-search"&gt;&lt;/div&gt;
&lt;script src="https://YOUR_DOMAIN/api/static/widget/embed.js"
        data-api="https://YOUR_DOMAIN"&gt;&lt;/script&gt;</code></pre>
    </div>

    <!-- The widget container -->
    <div id="canusa-search"></div>
  </div>

  <script>
    // Dynamically load the widget script with same-origin API base
    var s = document.createElement('script');
    s.src = '/api/static/widget/embed.js';
    s.setAttribute('data-api', window.location.origin);
    document.body.appendChild(s);
  </script>
</body>
</html>
